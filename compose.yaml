services:
  backend:
    image: ${BACKEND_IMAGE:-ref-type-backend:latest}
    build: ./backend
    container_name: backend-api
    env_file:
      - .env
    environment:
      DB_HOST: "${DB_HOST}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_DATABASE: "${DB_DATABASE}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      PORT: 8081
      FRONTEND_ORIGIN: http://localhost:3001
    ports:
      - "8081:8081"

  frontend:
    image: ${FRONTEND_IMAGE:-ref-type-frontend:latest}
    build:
      context: ./frontend
      args:
        - REACT_APP_FIRE_CLOUD=/api
    container_name: frontend-ui
    ports:
      - "3001:80"
    depends_on:
      - backend
